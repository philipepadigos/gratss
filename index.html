<title>Romantic Congratulations</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  min-height: 100%;
  min-height: 100dvh;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: radial-gradient(ellipse at 50% 60%, #3a0818 0%, #1a0510 50%, #0d0308 100%);
  background-attachment: fixed;
  overflow-x: hidden;
  font-family: 'Cormorant Garamond', serif;
  color: #f4c0d1;
  position: relative;
  padding: clamp(16px, 5vw, 40px) 16px clamp(60px, 12vw, 100px);
}

.bokeh-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
.bokeh {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(244,192,209,0.35) 0%, transparent 70%);
  animation: floatUp linear infinite;
}
.bokeh.gold {
  background: radial-gradient(circle, rgba(255,220,150,0.25) 0%, transparent 70%);
}
@keyframes floatUp {
  0% { transform: translateY(110vh) scale(0.4); opacity: 0; }
  15% { opacity: 0.7; }
  85% { opacity: 0.25; }
  100% { transform: translateY(-15vh) scale(1.8); opacity: 0; }
}

.scene-wrap {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: fadeScene 2.5s ease-out forwards;
  width: 100%;
  max-width: 500px;
}
@keyframes fadeScene { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }

.bouquet-svg-wrap {
  position: relative;
  width: min(420px, 90vw);
  height: auto;
  aspect-ratio: 420 / 520;
  filter: drop-shadow(0 20px 60px rgba(80,5,30,0.7));
}

.bouquet-svg-wrap svg {
  width: 100%;
  height: 100%;
}

.text-content {
  text-align: center;
  margin-top: clamp(-20px, -2vw, -10px);
  animation: fadeScene 3.5s ease-out forwards;
  padding: 0 8px;
}
.congrats-title {
  font-size: clamp(2rem, 9vw, 4rem);
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #f4c0d1;
  text-shadow: 0 0 40px rgba(244,140,180,0.5), 0 0 80px rgba(180,60,100,0.3);
  margin-bottom: 6px;
  line-height: 1.1;
}
.congrats-sub {
  font-size: clamp(0.7rem, 2.8vw, 1.1rem);
  font-style: italic;
  letter-spacing: 0.5em;
  color: rgba(244, 192, 209, 0.6);
}
.ornament {
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  color: rgba(244,192,209,0.35);
  letter-spacing: 0.6em;
  margin-top: 8px;
}

#music-btn {
  position: fixed; bottom: 20px; right: 16px;
  background: rgba(244,192,209,0.06);
  border: 1px solid rgba(244,192,209,0.25);
  padding: 8px 18px;
  color: rgba(244,192,209,0.75);
  cursor: pointer;
  font-family: inherit;
  font-style: italic;
  font-size: clamp(0.75rem, 3vw, 0.85rem);
  transition: 0.3s;
  border-radius: 20px;
  letter-spacing: 0.1em;
  z-index: 99;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#music-btn:hover { background: rgba(244,192,209,0.12); color: #f4c0d1; }
</style>

<style>
@keyframes bloom {
  from { transform: scale(0); opacity: 0; }
  to { opacity: 1; }
}
</style>

<script>
const bokehWrap = document.getElementById('bokeh-wrap');
for (let i = 0; i < 55; i++) {
  const b = document.createElement('div');
  b.className = 'bokeh' + (i % 4 === 0 ? ' gold' : '');
  const size = Math.random() * 70 + 15;
  b.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;animation-duration:${Math.random()*14+10}s;animation-delay:${Math.random()*12}s;`;
  bokehWrap.appendChild(b);
}

const music = document.getElementById('bg-music');
const btn = document.getElementById('music-btn');
function tryPlay() {
  music.play().then(() => { btn.innerText = "♪ Pause Music"; }).catch(() => { btn.innerText = "♪ Tap to Play"; });
}
window.addEventListener('load', tryPlay);
btn.addEventListener('click', () => {
  if (music.paused) { music.play(); btn.innerText = "♪ Pause Music"; }
  else { music.pause(); btn.innerText = "♪ Play Music"; }
});
document.body.addEventListener('click', () => { if(music.paused) tryPlay(); }, {once: true});
</script>
